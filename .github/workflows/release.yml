name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag matches package.json version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_REF#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION ≠ package.json $PKG_VERSION"
            exit 1
          fi
      - name: Verify no version drift across canonical locations
        run: node scripts/check-version-sync.js
      - name: Extract release notes from CHANGELOG
        id: changelog
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          # Slice the matching `## [X.Y.Z]` section: from that header up to (but
          # excluding) the next `## [` header. The CHANGELOG narrative is the
          # user-facing release record — far richer than squash-collapsed git
          # subjects.
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines.
          BODY=$(printf '%s\n' "$BODY" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
          if [ -z "$BODY" ]; then
            echo "::error::No CHANGELOG.md section found for [$VERSION] — refusing to release without release notes"
            exit 1
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
