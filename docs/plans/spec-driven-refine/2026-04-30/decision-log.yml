    (a) 窄但可靠:CI lint 只對 scripts/lib/ references 做 syntactic check,涵蓋 skills/**/SKILL.md, templates/**/*.md, agents/**/*.md。其他 plugin 內路徑(hooks/, scripts/cli.js 等)接受 prose 警告即可。
    (b) 寬一點:涵蓋多個 plugin 內目錄 + 白名單機制。
    (c) 完全不做 CI:只靠 prose + review。
  user_answer_verbatim: |
    你列的點都滿怪的。理論上 writing-tasks 沒有處理這個規範嗎?他是撰寫 skill 人的。arc-using 也不適合做這件事情。你在 CI 檢查一些錯誤 import 尚可接受,但 skill 本身的 scripts 就是 cwd relative path,你沒辦法區分吧?

    [refinement: arc-writing-skills 才是對的家;CI 接受;但 skill-local cwd-relative 沒辦法靜態區分]

